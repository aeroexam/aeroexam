<!DOCTYPE html>
<html lang="en">

<title>Aero Exam</title>

<style>

</head>
<body>

<div class="container">

    <h1>Aero Exam</h1>

    <div id="setupScreen">

        <input
            type="text"
            id="candidateName"
            placeholder="Full Name"
        >

        <input
            type="email"
            id="extraEmail"
            placeholder="Additional Email Recipient (Optional)"
        >

        <select id="subjectSelect">

            <option value="DJI">DJI</option>
            <option value="Skydio">Skydio</option>
            <option value="Data Processing">Data Processing</option>

        </select>

        <button onclick="startExam()">
            Start Exam
        </button>

    </div>

    <div id="quizScreen" class="hidden">

        <div id="questionsContainer"></div>

        <button onclick="submitExam()">
            Submit Exam
        </button>

    </div>

    <div id="resultScreen" class="hidden">

        <h2 id="scoreText"></h2>

    </div>

</div>

<script>

/////////////////////////////////////////////////////
// QUESTION BANK FILE
/////////////////////////////////////////////////////

fetch("aero_exam_question_bank.json")
.then(response => response.json())
.then(data => {

    questionBank = data;

})
.catch(error => {
    console.error(error);
    alert("Failed to load question bank.");
});

/////////////////////////////////////////////////////

let questionBank = {};

let questions = [];

let currentSubject = "";

/////////////////////////////////////////////////////
// RANDOMIZER
/////////////////////////////////////////////////////

function shuffleArray(array){

    return [...array].sort(() => Math.random() - 0.5);

}

/////////////////////////////////////////////////////
// START EXAM
/////////////////////////////////////////////////////

function startExam(){

    const candidateName =
        document.getElementById("candidateName").value;

    if(!candidateName){

        alert("Please enter your name.");

        return;
    }

    currentSubject =
        document.getElementById("subjectSelect").value;

    /////////////////////////////////////////////////////
    // RANDOM 10 QUESTIONS
    /////////////////////////////////////////////////////

    questions =
        shuffleArray(questionBank[currentSubject]).slice(0,10);

    /////////////////////////////////////////////////////

    renderQuestions();

    document
        .getElementById("setupScreen")
        .classList.add("hidden");

    document
        .getElementById("quizScreen")
        .classList.remove("hidden");
}

/////////////////////////////////////////////////////
// RENDER QUESTIONS
/////////////////////////////////////////////////////

function renderQuestions(){

    const container =
        document.getElementById("questionsContainer");

    container.innerHTML = "";

    questions.forEach((question, index) => {

        const div = document.createElement("div");

        div.className = "question";

        let choicesHTML = "";

        question.choices.forEach(choice => {

            choicesHTML += `
                <label>
                    <input
                        type="radio"
                        name="question${index}"
                        value="${choice}"
                    >
                    ${choice}
                </label>
                <br>
            `;
        });

        div.innerHTML = `
            <h3>
                ${index + 1}. ${question.question}
            </h3>

            ${choicesHTML}
        `;

        container.appendChild(div);

    });
}

/////////////////////////////////////////////////////
// SUBMIT EXAM
/////////////////////////////////////////////////////

function submitExam(){

    let score = 0;

    const userAnswers = [];

    questions.forEach((question, index) => {

        const selected =
            document.querySelector(
                `input[name="question${index}"]:checked`
            );

        const selectedAnswer =
            selected
            ? selected.value
            : "No Answer";

        /////////////////////////////////////////////////////
        // IMPORTANT
        //
        // IF YOUR JSON USES:
        // question.answer
        //
        // CHANGE BELOW
        /////////////////////////////////////////////////////

        const correctAnswer = question.correctAnswer;

        /////////////////////////////////////////////////////

        if(selectedAnswer === correctAnswer){

            score++;
        }

        userAnswers.push({

            question: question.question,

            selected: selectedAnswer,

            correct: correctAnswer
        });

    });

    document
        .getElementById("quizScreen")
        .classList.add("hidden");

    document
        .getElementById("resultScreen")
        .classList.remove("hidden");

    document
        .getElementById("scoreText")
        .innerText = `Score: ${score}/10`;

    sendResultsEmail(score, userAnswers);
}

/////////////////////////////////////////////////////
// SEND EMAIL
/////////////////////////////////////////////////////

function sendResultsEmail(score, userAnswers){

    const candidateName =
        document.getElementById("candidateName").value;

    const extraEmail =
        document.getElementById("extraEmail").value;

    let detailedResults = "";

    userAnswers.forEach((item, index) => {

        detailedResults += `

Question ${index + 1}

Question:
${item.question}

Selected Answer:
${item.selected}

Correct Answer:
${item.correct}

====================================

`;
    });

    /////////////////////////////////////////////////////
    // SEND EMAIL
    /////////////////////////////////////////////////////

    emailjs.send(

        /////////////////////////////////////////////////////
        // EDIT THIS
        /////////////////////////////////////////////////////

        "service_1x7oudi",

        "template_ei2kna4",

        /////////////////////////////////////////////////////

        {

            candidate_name: candidateName,

            subject_name: currentSubject,

            score: `${score}/10`,

            detailed_results: detailedResults,

            to_email: "cvargas@enable.ph",

            cc_email: extraEmail
        }

    )
    .then(() => {

        alert("Results sent successfully!");

    })
    .catch((error) => {

        console.error(error);

        alert("Failed to send email.");

    });
}

</script>

</body>
</html>
